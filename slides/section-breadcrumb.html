<style>
.reveal .section-breadcrumb {
  position: fixed;
  right: 18px;
  bottom: 14px;
  z-index: 30;
  display: flex;
  align-items: center;
  gap: 0.45rem;
  max-width: min(34vw, 360px);
  padding: 0.28rem 0.5rem;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.82);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
  backdrop-filter: blur(6px);
  font-size: 0.5em;
  line-height: 1;
  pointer-events: none;
}

.reveal .section-breadcrumb[hidden] {
  display: none;
}

.reveal .section-breadcrumb-label {
  flex: 0 0 auto;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: #2f6fab;
}

.reveal .section-breadcrumb-track {
  min-width: 0;
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 0.22rem;
}

.reveal .section-breadcrumb-step {
  flex: 0 0 auto;
  color: #7b8794;
}

.reveal .section-breadcrumb-step::before {
  content: "";
  display: block;
  width: 0.42rem;
  height: 0.42rem;
  border-radius: 999px;
  background: #c8d4e3;
}

.reveal .section-breadcrumb-step.is-active {
  color: #16324f;
  font-weight: 700;
}

.reveal .section-breadcrumb-step.is-active::before {
  background: #2f6fab;
}

.reveal .section-breadcrumb-step.is-complete::before {
  background: #79a8d8;
}

.reveal .section-breadcrumb-current {
  min-width: 0;
  max-width: 18ch;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: #16324f;
  font-weight: 600;
}

@media (max-width: 900px) {
  .reveal .section-breadcrumb {
    right: 10px;
    bottom: 10px;
    max-width: min(55vw, 260px);
    padding: 0.22rem 0.42rem;
    font-size: 0.45em;
  }

  .reveal .section-breadcrumb-label {
    display: none;
  }

  .reveal .section-breadcrumb-current {
    max-width: 12ch;
  }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
  var revealRoot = document.querySelector(".reveal");
  var slidesRoot = document.querySelector(".reveal .slides");

  if (!revealRoot || !slidesRoot || typeof Reveal === "undefined") {
    return;
  }

  var topSections = Array.from(slidesRoot.children).filter(function (el) {
    return el.tagName === "SECTION";
  });

  if (topSections.length < 2) {
    return;
  }

  function topSectionTitle(section, fallbackIndex) {
    var directHeading = Array.from(section.children).find(function (child) {
      return /^H[1-3]$/.test(child.tagName);
    });

    if (directHeading && directHeading.textContent.trim()) {
      return directHeading.textContent.trim();
    }

    var nestedHeading = section.querySelector("section h1, section h2, h1, h2");
    if (nestedHeading && nestedHeading.textContent.trim()) {
      return nestedHeading.textContent.trim();
    }

    return "Section " + (fallbackIndex + 1);
  }

  var labels = topSections.map(function (section, index) {
    return topSectionTitle(section, index);
  });

  var nav = document.createElement("div");
  nav.className = "section-breadcrumb";
  nav.setAttribute("hidden", "hidden");

  var navLabel = document.createElement("div");
  navLabel.className = "section-breadcrumb-label";
  navLabel.textContent = "Sections";
  nav.appendChild(navLabel);

  var currentLabel = document.createElement("div");
  currentLabel.className = "section-breadcrumb-current";
  nav.appendChild(currentLabel);

  var track = document.createElement("div");
  track.className = "section-breadcrumb-track";
  nav.appendChild(track);

  var steps = labels.map(function () {
    var step = document.createElement("div");
    step.className = "section-breadcrumb-step";
    track.appendChild(step);
    return step;
  });

  revealRoot.appendChild(nav);

  function topSectionForSlide(slide) {
    if (!slide) {
      return null;
    }

    var node = slide;
    while (node && node.parentElement && !node.parentElement.classList.contains("slides")) {
      node = node.parentElement.closest("section");
    }
    return node;
  }

  function update() {
    var current = Reveal.getCurrentSlide();
    var currentTop = topSectionForSlide(current);
    var currentIndex = topSections.indexOf(currentTop);

    if (currentIndex === -1) {
      nav.setAttribute("hidden", "hidden");
      return;
    }

    nav.removeAttribute("hidden");
    currentLabel.textContent = labels[currentIndex];

    steps.forEach(function (step, index) {
      step.classList.remove("is-active", "is-complete");
      if (index < currentIndex) {
        step.classList.add("is-complete");
      } else if (index === currentIndex) {
        step.classList.add("is-active");
      }
    });
  }

  Reveal.on("ready", update);
  Reveal.on("slidechanged", update);
  update();
});
</script>
