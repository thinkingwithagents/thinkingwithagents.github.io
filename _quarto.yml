project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!slides/"

website:
  title: "AI for UVM Economics"
  description: "Modular AI literacy resources for UVM Economics students and faculty"
  site-url: https://eabeam.github.io/uvmecon-ai
  repo-url: https://github.com/eabeam/uvmecon-ai
  repo-actions: [issue]

  navbar:
    background: primary
    left:
      - href: index.qmd
        text: Home
      - href: prep.qmd
        text: "Prep Guide"
      - href: resources.qmd
        text: "Outside Resources"
      - href: session1.qmd
        text: "Session 1 (Apr 22)"
      - href: session2.qmd
        text: "Session 2 (Apr 27)"

  page-footer:
    center: |
      Licensed under [CC-BY 4.0](https://creativecommons.org/licenses/by/4.0/).
      Built by [Emily Beam](https://eabeam.github.io), University of Vermont.

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
