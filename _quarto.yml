project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!slides/"

website:
  title: "Thinking with Agents"
  description: "AI tools for teaching and research — workshops, bootcamps, and resources"
  site-url: https://thinkingwithagents.github.io
  repo-url: https://github.com/thinkingwithagents/thinkingwithagents.github.io
  repo-actions: [issue]

  navbar:
    background: primary
    left:
      - href: index.qmd
        text: Home
      - href: webinars.qmd
        text: "Webinars"
      - href: bootcamp.qmd
        text: "RA Bootcamp"
      - href: resources.qmd
        text: "Resources"
      - href: applications.qmd
        text: "Skills & Demos"

  body-footer: |
    <script data-goatcounter="https://eabeam.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
    <script>
    document.addEventListener('click', function(e) {
      var link = e.target.closest('a');
      if (link && link.href && link.href.match(/\.pdf$/i)) {
        goatcounter.count({path: 'download:' + link.href.split('/').pop(), event: true});
      }
    });
    </script>

  page-footer:
    center: |
      Licensed under [CC-BY 4.0](https://creativecommons.org/licenses/by/4.0/).
      Built by Emily Beam and Erkmen Aslim.

format:
  html:
    theme:
      - cosmo
      - custom.scss
    css: styles.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
