project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!slides/"

website:
  title: "AI for UVM Economics"
  description: "Modular AI literacy resources for UVM Economics students and faculty"
  site-url: https://eabeam.github.io/uvmecon-ai
  repo-url: https://github.com/eabeam/uvmecon-ai
  repo-actions: [issue]

  navbar:
    background: primary
    left:
      - href: index.qmd
        text: Home
      - href: prep.qmd
        text: "Prep Guide"
      - href: applications.qmd
        text: "Applications"
      - href: skills.qmd
        text: "Skills & Demos"
      - href: resources.qmd
        text: "Bells & Whistles"
      - href: session1.qmd
        text: "Session 1 (Apr 22)"
      - text: "Session 2 (Apr 27) — coming soon"

  body-footer: |
    <script data-goatcounter="https://eabeam.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
    <script>
    document.addEventListener('click', function(e) {
      var link = e.target.closest('a');
      if (link && link.href && link.href.match(/\.pdf$/i)) {
        goatcounter.count({path: 'download:' + link.href.split('/').pop(), event: true});
      }
    });
    </script>

  page-footer:
    center: |
      Licensed under [CC-BY 4.0](https://creativecommons.org/licenses/by/4.0/).
      Built by [Emily Beam](https://eabeam.github.io), University of Vermont.

format:
  html:
    theme:
      - cosmo
      - custom.scss
    css: styles.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
